services:
  www-service-staging:
    image: nginx:latest
    container_name: www-service-staging
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - proxy
    restart: always

networks:
  proxy:
    name: afjkjp_default
    external: true
