openapi: 3.1.0
info:
  title: Scene Sync GPT Wrapper API
  version: 0.1.0
  description: |
    GPT Builder 用の wrapper API。認証は Authorization header ではなく
    request body の sessionId で行う。
servers:
  - url: https://staging.afjk.jp/presence/api/gpt
    description: Staging
  - url: https://afjk.jp/presence/api/gpt
    description: Production
paths:
  /link/redeem:
    post:
      operationId: redeemGptLink
      summary: Redeem a 6-digit pairing code and create a GPT session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code:
                  type: string
                  pattern: '^\d{6}$'
      responses:
        '200':
          description: GPT session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GptRedeemResponse'
  /link/revoke:
    post:
      operationId: revokeGptLink
      summary: Revoke a GPT session and underlying AI link
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionOnlyRequest'
      responses:
        '200':
          description: Link revoked
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
  /room/{roomId}/scene:
    post:
      operationId: getSceneViaGptSession
      summary: Get current scene state
      parameters:
        - in: path
          name: roomId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionOnlyRequest'
      responses:
        '200':
          description: Scene snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SceneState'
  /room/{roomId}/broadcast:
    post:
      operationId: broadcastSceneMutationViaGptSession
      summary: Apply a scene mutation
      description: |
        Use this for scene-add, scene-delta, scene-remove, scene-env, and scene-batch.
        When creating a primitive object such as a box, always include `payload.asset`
        with `type`, `primitive`, and `color`.
      parameters:
        - in: path
          name: roomId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, payload]
              properties:
                sessionId:
                  type: string
                payload:
                  description: |
                    Scene mutation payload. For `scene-add` of a primitive object, do not omit
                    `asset`. A cube without `asset` may be created without the intended appearance.
                  oneOf:
                    - $ref: '#/components/schemas/SceneAddPayload'
                    - $ref: '#/components/schemas/SceneDeltaPayload'
                    - $ref: '#/components/schemas/SceneRemovePayload'
                    - $ref: '#/components/schemas/SceneEnvPayload'
                    - $ref: '#/components/schemas/SceneBatchPayload'
              example:
                sessionId: v1.example
                payload:
                  kind: scene-add
                  objectId: ai-cube-1
                  name: Orange Cube
                  position: [0, 0.5, 0]
                  rotation: [0, 0, 0, 1]
                  scale: [1, 1, 1]
                  asset:
                    type: primitive
                    primitive: box
                    color: '#ff8800'
      responses:
        '200':
          description: Broadcast result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BroadcastResponse'
  /room/{roomId}/ai-command:
    post:
      operationId: runAiCommandViaGptSession
      summary: Request a browser-only action from the linked peer
      description: |
        Use this for browser-only actions such as camera queries, focus, undo/redo,
        screenshots, and URL-based GLB import. For `focusObject`, always send
        `params.objectId`. Do not call `focusObject` without an object id.
      parameters:
        - in: path
          name: roomId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [sessionId, action]
              properties:
                sessionId:
                  type: string
                requestId:
                  type: string
                action:
                  type: string
                  enum:
                    - getCameraPose
                    - focusObject
                    - undo
                    - redo
                    - getHistory
                    - screenshot
                    - uploadGlbFromUrl
                params:
                  description: |
                    Parameters depend on `action`. For `focusObject`, send
                    `{ "objectId": "<target object id>" }`. For `uploadGlbFromUrl`,
                    send at least `{ "url": "https://..." }`.
                  oneOf:
                    - $ref: '#/components/schemas/GetCameraPoseParams'
                    - $ref: '#/components/schemas/FocusObjectParams'
                    - $ref: '#/components/schemas/UndoRedoParams'
                    - $ref: '#/components/schemas/GetHistoryParams'
                    - $ref: '#/components/schemas/ScreenshotParams'
                    - $ref: '#/components/schemas/UploadGlbFromUrlParams'
                targetPeerId:
                  type: string
            examples:
              focusObject:
                summary: Focus the camera on ai-cube-1
                value:
                  sessionId: v1.example
                  action: focusObject
                  params:
                    objectId: ai-cube-1
              getCameraPose:
                summary: Read the current camera pose
                value:
                  sessionId: v1.example
                  action: getCameraPose
                  params: {}
              uploadGlbFromUrl:
                summary: Import a GLB from a URL
                value:
                  sessionId: v1.example
                  action: uploadGlbFromUrl
                  params:
                    url: https://example.com/model.glb
                    objectId: web-demo-1
                    position: [0, 0.5, 0]
      responses:
        '200':
          description: AI command result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AiCommandResponse'
components:
  schemas:
    SessionOnlyRequest:
      type: object
      required: [sessionId]
      properties:
        sessionId:
          type: string
          description: Opaque session token `v1.<base64url(iv|ciphertext|tag)>`
    GptRedeemResponse:
      type: object
      required: [ok, sessionId, roomId, expiresAt]
      properties:
        ok:
          type: boolean
        sessionId:
          type: string
        roomId:
          type: string
        expiresAt:
          type: integer
    BroadcastResponse:
      type: object
      required: [ok, room, peers, userPresent]
      properties:
        ok:
          type: boolean
        room:
          type: string
        peers:
          type: integer
        userPresent:
          type: boolean
    AiCommandResponse:
      type: object
      required: [ok, room, peers, userPresent, targetPeerId, result]
      properties:
        ok:
          type: boolean
        room:
          type: string
        peers:
          type: integer
        userPresent:
          type: boolean
        targetPeerId:
          type: string
        result:
          $ref: '#/components/schemas/AiResultPayload'
    AiResultPayload:
      type: object
      required: [kind, ok]
      properties:
        kind:
          type: string
          const: ai-result
        requestId:
          type: string
        ok:
          type: boolean
        error:
          type: string
      additionalProperties: true
    GetCameraPoseParams:
      type: object
      description: No parameters.
      properties: {}
      additionalProperties: false
      example: {}
    FocusObjectParams:
      type: object
      required: [objectId]
      additionalProperties: false
      properties:
        objectId:
          type: string
          description: Existing scene object id to focus the camera on.
      example:
        objectId: ai-cube-1
    UndoRedoParams:
      type: object
      description: No parameters.
      properties: {}
      additionalProperties: false
      example: {}
    GetHistoryParams:
      type: object
      additionalProperties: false
      properties:
        count:
          type: integer
          minimum: 1
          maximum: 100
          description: Number of recent history entries to return.
      example:
        count: 10
    ScreenshotParams:
      type: object
      description: No parameters.
      properties: {}
      additionalProperties: false
      example: {}
    UploadGlbFromUrlParams:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        objectId:
          type: string
        name:
          type: string
        position:
          $ref: '#/components/schemas/Vec3'
        rotation:
          $ref: '#/components/schemas/Quat'
        scale:
          $ref: '#/components/schemas/Vec3'
      example:
        url: https://example.com/model.glb
        objectId: web-demo-1
        position: [0, 0.5, 0]
    SceneState:
      type: object
      properties:
        envId:
          type: string
        objects:
          type: object
          additionalProperties:
            type: object
            additionalProperties: true
    SceneAddPayload:
      type: object
      description: |
        Adds a new object to the scene. If you are creating a primitive object,
        include `asset` and set `asset.type=primitive`, `asset.primitive`, and `asset.color`.
        Do not rely on `name` alone to describe the appearance.
      required: [kind, objectId]
      properties:
        kind:
          type: string
          const: scene-add
        objectId:
          type: string
          description: Stable object identifier chosen by the caller.
        name:
          type: string
          description: Human-readable label. This does not define appearance.
        position:
          $ref: '#/components/schemas/Vec3'
        rotation:
          $ref: '#/components/schemas/Quat'
        scale:
          $ref: '#/components/schemas/Vec3'
        asset:
          description: |
            Required when adding a primitive object. Example:
            `{ "type": "primitive", "primitive": "box", "color": "#ff8800" }`
          oneOf:
            - $ref: '#/components/schemas/PrimitiveAsset'
            - $ref: '#/components/schemas/GenericAsset'
        meshPath:
          type: string
        onBehalfOf:
          type: string
      example:
        kind: scene-add
        objectId: ai-cube-1
        name: Orange Cube
        position: [0, 0.5, 0]
        rotation: [0, 0, 0, 1]
        scale: [1, 1, 1]
        asset:
          type: primitive
          primitive: box
          color: '#ff8800'
    SceneDeltaPayload:
      type: object
      required: [kind, objectId]
      properties:
        kind:
          type: string
          const: scene-delta
        objectId:
          type: string
        name:
          type: string
        position:
          $ref: '#/components/schemas/Vec3'
        rotation:
          $ref: '#/components/schemas/Quat'
        scale:
          $ref: '#/components/schemas/Vec3'
        asset:
          oneOf:
            - $ref: '#/components/schemas/PrimitiveAsset'
            - $ref: '#/components/schemas/GenericAsset'
        meshPath:
          type: string
        onBehalfOf:
          type: string
    SceneRemovePayload:
      type: object
      required: [kind, objectId]
      properties:
        kind:
          type: string
          const: scene-remove
        objectId:
          type: string
        onBehalfOf:
          type: string
    SceneEnvPayload:
      type: object
      required: [kind, envId]
      properties:
        kind:
          type: string
          const: scene-env
        envId:
          type: string
        onBehalfOf:
          type: string
    SceneBatchPayload:
      type: object
      required: [kind, ops]
      properties:
        kind:
          type: string
          const: scene-batch
        ops:
          type: array
          items:
            oneOf:
              - $ref: '#/components/schemas/SceneAddPayload'
              - $ref: '#/components/schemas/SceneDeltaPayload'
              - $ref: '#/components/schemas/SceneRemovePayload'
              - $ref: '#/components/schemas/SceneEnvPayload'
        onBehalfOf:
          type: string
      example:
        kind: scene-batch
        ops:
          - kind: scene-add
            objectId: ai-cube-1
            name: Orange Cube
            position: [0, 0.5, 0]
            rotation: [0, 0, 0, 1]
            scale: [1, 1, 1]
            asset:
              type: primitive
              primitive: box
              color: '#ff8800'
    PrimitiveAsset:
      type: object
      required: [type, primitive]
      properties:
        type:
          type: string
          const: primitive
        primitive:
          type: string
          description: Primitive mesh type such as box, sphere, cylinder, or plane.
          enum: [box, sphere, cylinder, plane]
        color:
          type: string
          description: Hex color for the primitive, for example `#ff8800`.
      example:
        type: primitive
        primitive: box
        color: '#ff8800'
    GenericAsset:
      type: object
      description: Non-primitive asset payload used by custom meshes or future asset types.
      properties: {}
      additionalProperties: true
    Vec3:
      type: array
      minItems: 3
      maxItems: 3
      items:
        type: number
    Quat:
      type: array
      minItems: 4
      maxItems: 4
      items:
        type: number
