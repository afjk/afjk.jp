# ── ポート設定 ────────────────────────────────────────────────────────────────
listening-port=3478
tls-listening-port=5349

# ── TLS 証明書 (https-portal が取得した afjk.jp の証明書を共有) ──────────────
cert=/etc/certs/afjk.jp/production/signed.crt
pkey=/etc/certs/afjk.jp/production/domain.key

# ── 認証 ─────────────────────────────────────────────────────────────────────
fingerprint
lt-cred-mech
realm=afjk.jp
# ユーザー認証は docker-entrypoint.sh で --user= として追加

# ── リレーポート範囲 ──────────────────────────────────────────────────────────
# 同時セッション数の目安 = (max-port - min-port + 1) / 2
# 49 ポート → 最大約 24 同時セッション
min-port=49152
max-port=49200

# ── セキュリティ: 内部ネットワークへのリレーを拒否 (SSRF 対策) ───────────────
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=127.0.0.0-127.255.255.255

# ── ログ (Docker stdout へ) ───────────────────────────────────────────────────
no-stdout-log
syslog
