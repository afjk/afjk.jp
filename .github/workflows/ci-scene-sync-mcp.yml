name: CI - Scene Sync MCP

on:
  pull_request:
    paths:
      - "packages/scene-sync-mcp/**"
      - ".github/workflows/ci-scene-sync-mcp.yml"
      - ".github/workflows/publish-scene-sync-mcp.yml"
  push:
    branches:
      - main
    paths:
      - "packages/scene-sync-mcp/**"
      - ".github/workflows/ci-scene-sync-mcp.yml"
      - ".github/workflows/publish-scene-sync-mcp.yml"

permissions:
  contents: read

jobs:
  test:
    name: Check Scene Sync MCP
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/scene-sync-mcp

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/scene-sync-mcp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: |
          node --check src/server.mjs
          node --check src/scene-sync-client.mjs
          node --check src/session-store.mjs
          node --check src/tool-results.mjs
          node --check src/validators.mjs

      - name: Run tests if present
        run: npm test --if-present

      - name: Dry-run npm package
        run: npm pack --dry-run
