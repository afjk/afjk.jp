version: "3.8"
services:
  https-portal:
    image: steveltn/https-portal
    container_name: https-portal
    ports:
      - 80:80
      - 443:443
    restart: always
    environment:
      # ドメイン設定 (複数ドメインも対応可能)
      DOMAINS: |
        afjk.jp -> http://www-service:80,
        www.afjk.jp -> http://www-service:80,
        upm.afjk.jp -> http://verdaccio:4873,
        pipe.afjk.jp -> http://piping-server:8080
      CLIENT_MAX_BODY_SIZE: 0
      # piping-server のストリーミング転送を最適化
      CUSTOM_NGINX_SERVER_CONFIG_BLOCK: |
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        location /presence {
          proxy_pass http://presence-server:8787/;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $$http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_read_timeout 3600s;
        }
      # 本番環境の場合は "production" を指定
      STAGE: production
    volumes:
      # 証明書を永続化
      - ./https-portal-certs:/var/lib/https-portal

  # www.afjk.jp 用の Web サービス
  www-service:
    image: nginx:latest
    container_name: www-service
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  # upm.afjk.jp 用の Verdaccio
  verdaccio:
    image: verdaccio/verdaccio
    container_name: verdaccio
    restart: always
    environment:
      - VERDACCIO_PORT=4873
    volumes:
      - "./verdaccio/storage:/verdaccio/storage"
      - "./verdaccio/config:/verdaccio/conf"
      - "./verdaccio/plugins:/verdaccio/plugins"


  # afjk.jp/piping 用の Piping Server
  piping-server:
    image: nwtgck/piping-server
    container_name: piping-server
    ports:
      - "8080:8080" # ホストの8080ポートをコンテナの8080ポートにマッピング
    environment:
      - PORT=8080 # Piping Serverがリッスンするポート
    restart: always

  presence-server:
    build: ./apps/presence-server
    container_name: presence-server
    restart: always
    environment:
      - PORT=8787
