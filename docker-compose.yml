services:
  https-portal:
    image: steveltn/https-portal
    container_name: https-portal
    ports:
      - 80:80
      - 443:443
    restart: always
    environment:
      # ドメイン設定 (複数ドメインも対応可能)
      DOMAINS: |
        afjk.jp -> http://www-service:80,
        www.afjk.jp -> http://www-service:80,
        upm.afjk.jp -> http://verdaccio:4873,
        pipe.afjk.jp -> http://piping-server:8080,
        staging.afjk.jp -> http://www-service-staging:80
      CLIENT_MAX_BODY_SIZE: 0
      # piping-server のストリーミング転送を最適化
      CUSTOM_NGINX_SERVER_CONFIG_BLOCK: |
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        location /presence {
          proxy_pass http://presence-server:8787/;
          proxy_http_version 1.1;
          proxy_set_header Upgrade $$http_upgrade;
          proxy_set_header Connection "upgrade";
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_read_timeout 3600s;
        }
        location /stream/ {
          proxy_pass http://mediamtx:8889/;
          proxy_http_version 1.1;
          proxy_set_header Host $$host;
          proxy_set_header X-Real-IP $$remote_addr;
          proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $$scheme;
          proxy_read_timeout 3600s;
        }
      # 本番環境の場合は "production" を指定
      STAGE: production
    volumes:
      # 証明書を永続化
      - ./https-portal-certs:/var/lib/https-portal

  # www.afjk.jp 用の Web サービス
  www-service:
    image: nginx:latest
    container_name: www-service
    volumes:
      - ./html:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: always

  # upm.afjk.jp 用の Verdaccio
  verdaccio:
    image: verdaccio/verdaccio
    container_name: verdaccio
    restart: always
    environment:
      - VERDACCIO_PORT=4873
    volumes:
      - "${VERDACCIO_DATA_DIR:-./verdaccio}/storage:/verdaccio/storage"
      - "${VERDACCIO_DATA_DIR:-./verdaccio}/config:/verdaccio/conf"
      - "${VERDACCIO_DATA_DIR:-./verdaccio}/plugins:/verdaccio/plugins"


  # afjk.jp/piping 用の Piping Server
  piping-server:
    image: nwtgck/piping-server
    container_name: piping-server
    ports:
      - "8080:8080" # ホストの8080ポートをコンテナの8080ポートにマッピング
    environment:
      - PORT=8080 # Piping Serverがリッスンするポート
    restart: always

  presence-server:
    build: ./apps/presence-server
    container_name: presence-server
    restart: always
    ports:
      - "8787:8787"
    environment:
      - PORT=8787
      - STATS_FILE=/data/stats.json
      # TURN server config — .env で TURN_URL を設定すると ICE 候補に含まれる
      - TURN_URL=${TURN_URL:-}
      - TURN_USERNAME=${TURN_USERNAME:-pipe}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-pipe}
      - MEDIAMTX_API_URL=http://mediamtx:9997
    volumes:
      - presence-stats:/data

  # TURN サーバー (Symmetric NAT 環境での WebRTC 中継)
  # .env で TURN_USERNAME / TURN_CREDENTIAL を設定すると有効になる
  # 未設定の場合は起動直後に正常終了し、TURN なしで動作する
  # 外部 IP が自動検出できない場合は COTURN_EXTERNAL_IP も設定する
  coturn:
    image: coturn/coturn:4.9.0
    container_name: coturn
    restart: on-failure
    entrypoint: ["/bin/sh", "/etc/coturn/docker-entrypoint.sh"]
    ports:
      - "3478:3478/udp"         # TURN (UDP)
      - "3478:3478/tcp"         # TURN (TCP)
      - "5349:5349/tcp"         # TURNS (TLS) — ファイアウォール越えに最適
      - "49152-49200:49152-49200/udp"  # リレーポート範囲
    environment:
      - TURN_USERNAME=${TURN_USERNAME:-pipe}
      - TURN_CREDENTIAL=${TURN_CREDENTIAL:-pipe}
      - COTURN_EXTERNAL_IP=${COTURN_EXTERNAL_IP:-}
    volumes:
      - ./coturn:/etc/coturn:ro
      - ./https-portal-certs:/etc/certs:ro  # https-portal の TLS 証明書を共有

  # MediaMTX — WebRTC (WHIP/WHEP) メディアサーバー
  # .env に MEDIAMTX_EXTERNAL_IP=<公開IP> を設定すると ICE 候補に含まれる
  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: mediamtx
    restart: always
    ports:
      - "8189:8189/udp"   # WebRTC ICE メディア (ファイアウォールで開放必要)
    environment:
      # 公開サーバーの実 IP — 設定すると ICE 候補に追加される
      - MTX_WEBRTCADDITIONALHOSTS=${MEDIAMTX_EXTERNAL_IP:-}
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro

volumes:
  presence-stats:
