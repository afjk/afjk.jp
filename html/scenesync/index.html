<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Sync — afjk.jp</title>
  <meta name="description" content="ブラウザと Unity の間で 3D シーンをリアルタイム共有する。ルーム参加者全員で glB を配置・編集できる Scene Sync。">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #222; touch-action: none; }
    canvas { display: block; touch-action: none; cursor: pointer; -webkit-user-select: none; user-select: none; }

    /* ── 共通 chip スタイル ── */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 6px;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      border: none;
      color: #fff;
      font: 13px/1.4 monospace;
      cursor: pointer;
      text-decoration: none;
      white-space: nowrap;
    }
    .chip:hover { background: rgba(0,0,0,0.75); }
    .chip.danger { background: rgba(255,60,60,0.5); }
    .chip.danger:hover { background: rgba(255,60,60,0.7); }
    .chip.primary { background: rgba(68,136,255,0.55); }
    .chip.primary:hover { background: rgba(68,136,255,0.8); }

    #status {
      position: fixed;
      top: 12px;
      right: 12px;
      padding: 6px 14px;
      border-radius: 6px;
      font: 13px/1.4 monospace;
      color: #fff;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      z-index: 10;
      user-select: none;
    }
    #status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    #status .dot.on  { background: #4f4; }
    #status .dot.off { background: #f44; }

    /* ── 左上 設定パネル ── */
    #settings-panel {
      position: fixed;
      top: 12px;
      left: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      z-index: 10;
      max-width: min(380px, calc(100vw - 24px));
    }
    #settings-panel .row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .chip-edit { opacity: 0.6; font-size: 11px; }
    #room-code {
      font-weight: bold;
      letter-spacing: 0.05em;
    }
    .room-input {
      width: 110px;
      padding: 6px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.5);
      color: #fff;
      font: 13px/1.4 monospace;
      outline: none;
    }
    .room-input:focus { border-color: rgba(68,136,255,0.7); }

    #mode {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 14px;
      border-radius: 6px;
      font: 13px/1.4 monospace;
      color: #aaa;
      background: rgba(0,0,0,0.45);
      z-index: 10;
      user-select: none;
    }
    #add-btn {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: rgba(68, 136, 255, 0.8);
      color: #fff;
      font-size: 24px;
      cursor: pointer;
      z-index: 10;
      backdrop-filter: blur(6px);
      user-select: none;
    }
    #add-btn:hover {
      background: rgba(68, 136, 255, 1);
    }
    #drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(68, 136, 255, 0.15);
      border: 3px dashed rgba(68, 136, 255, 0.6);
      z-index: 100;
      font: 24px/1 monospace;
      color: #fff;
      justify-content: center;
      align-items: center;
    }
    #drop-overlay.active {
      display: flex;
    }
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.8);
      color: #fff;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 14px;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 100;
    }
    #toast.show {
      opacity: 1;
    }
    #mobile-toolbar {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 50;
    }
    .tb-btn {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      background: rgba(255,255,255,0.15);
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .tb-btn.active {
      background: rgba(68,136,255,0.6);
    }
    .tb-btn.btn-danger {
      background: rgba(255,60,60,0.5);
    }
    .tb-btn:hover {
      background: rgba(255,255,255,0.3);
    }
    .tb-btn.btn-danger:hover {
      background: rgba(255,60,60,0.7);
    }
    #peers-panel {
      position: fixed;
      top: 48px;
      right: 12px;
      background: rgba(0, 0, 0, 0.6);
      border-radius: 8px;
      padding: 8px 12px;
      color: #fff;
      font-size: 13px;
      z-index: 50;
      min-width: 120px;
      max-height: 40vh;
      overflow-y: auto;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }
    .peer-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 3px 0;
      white-space: nowrap;
    }
    .peer-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4f4;
      flex-shrink: 0;
    }
    .peer-dot.self {
      background: #48f;
    }
    .peer-name {
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .peer-editing {
      font-size: 11px;
      color: #ff8800;
      margin-left: auto;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div id="settings-panel">
    <div class="row">
      <button id="nickname-chip" class="chip" type="button" title="名前を変更">
        <span>👤</span>
        <span id="nickname-label">—</span>
        <span class="chip-edit">✏️</span>
      </button>
    </div>
    <div class="row" id="room-section"></div>
  </div>

  <div id="status"><span class="dot off"></span>接続中…</div>
  <div id="peers-panel">
    <div id="peers-list"></div>
  </div>
  <button id="add-btn" title="glB / glTF を追加">＋</button>
  <input type="file" id="file-input" accept=".glb,.gltf" style="display:none">
  <div id="drop-overlay">ドロップして追加</div>
  <div id="mode">W: 移動 &nbsp; E: 回転 &nbsp; R: スケール</div>
  <div id="toast"></div>
  <div id="mobile-toolbar" style="display:none;">
    <button id="btn-move" class="tb-btn active" title="移動">☩</button>
    <button id="btn-rotate" class="tb-btn" title="回転">↻</button>
    <button id="btn-scale" class="tb-btn" title="スケール">⤡</button>
    <button id="btn-delete" class="tb-btn btn-danger" title="削除">🗑</button>
    <button id="btn-deselect" class="tb-btn" title="選択解除">✕</button>
  </div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/assets/js/scenesync/scene.js"></script>
</body>
</html>
