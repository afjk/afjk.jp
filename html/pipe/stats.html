<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pipe Stats</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --bg: #0b0b0f;
      --card: #15151b;
      --accent: #7afc4c;
      --muted: #8a8f9c;
    }
    body {
      margin: 0;
      padding: 32px;
      background: var(--bg);
      color: #f4f4f7;
      min-height: 100vh;
    }
    h1 {
      margin-top: 0;
      font-size: 1.8rem;
    }
    .controls {
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    button, select {
      border: 1px solid var(--accent);
      background: transparent;
      color: inherit;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    button:hover, select:focus {
      background: rgba(122,252,76,0.15);
    }
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin-bottom: 32px;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.3);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: var(--card);
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      font-size: 0.9rem;
    }
    th {
      background: rgba(255,255,255,0.04);
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }
    tbody tr:last-child td {
      border-bottom: none;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.p2p { background: rgba(122,252,76,0.15); color: var(--accent); }
    .badge.pipe { background: rgba(255,209,102,0.2); color: #ffd166; }
    .badge.torrent { background: rgba(147,197,253,0.18); color: #93c5fd; }
    .muted { color: var(--muted); font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Transfer Stats</h1>
  <div class="controls">
    <button id="refresh">Refresh</button>
    <label>
      Type:
      <select id="type-filter">
        <option value="">All</option>
        <option value="p2p">P2P</option>
        <option value="pipe">Pipe</option>
        <option value="torrent">Torrent</option>
      </select>
    </label>
    <label>
      Limit:
      <select id="limit">
        <option value="50">50</option>
        <option value="100" selected>100</option>
        <option value="200">200</option>
        <option value="500">500</option>
      </select>
    </label>
    <button id="download">Download CSV</button>
    <span class="muted" id="updated"></span>
  </div>
  <div class="summary" id="summary"></div>
  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Timestamp</th>
          <th>Type</th>
          <th>Bytes</th>
          <th>Transport</th>
          <th>Chunk</th>
          <th>Handshake</th>
          <th>Transfer</th>
        </tr>
      </thead>
      <tbody id="log-rows">
        <tr><td colspan="7" class="muted">Loading…</td></tr>
      </tbody>
    </table>
  </div>
  <script>
    const STATS_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? `http://${location.hostname}:8787`
      : '/presence';
    const statsUrl = () => {
      const type = document.getElementById('type-filter').value;
      const limit = document.getElementById('limit').value;
      const params = new URLSearchParams({ limit });
      if (type) params.set('type', type);
      return `${STATS_BASE}/stats?${params.toString()}`;
    };
    const csvUrl = () => {
      const type = document.getElementById('type-filter').value;
      const limit = document.getElementById('limit').value;
      const params = new URLSearchParams({ limit, format: 'csv' });
      if (type) params.set('type', type);
      return `${STATS_BASE}/stats/export?${params.toString()}`;
    };

    async function loadStats() {
      const tbody = document.getElementById('log-rows');
      tbody.innerHTML = '<tr><td colspan="7" class="muted">Loading…</td></tr>';
      try {
        const res = await fetch(statsUrl());
        if (!res.ok) throw new Error(res.statusText);
        const data = await res.json();
        renderSummary(data.summary || {});
        renderLogs(data.logs || []);
        document.getElementById('updated').textContent = `Updated ${new Date().toLocaleTimeString()}`;
      } catch (err) {
        tbody.innerHTML = `<tr><td colspan="7" class="muted">Failed: ${err.message}</td></tr>`;
      }
    }

    function renderSummary(summary) {
      const wrap = document.getElementById('summary');
      wrap.innerHTML = '';
      ['p2p','pipe','torrent'].forEach(type => {
        const entry = summary?.[type] || { count:0, bytes:0 };
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h2>${type.toUpperCase()}</h2>
          <div style="font-size:2rem;font-weight:600">${entry.count}</div>
          <div class="muted">${formatBytes(entry.bytes)} transferred</div>`;
        wrap.appendChild(card);
      });
    }

    function renderLogs(logs) {
      const tbody = document.getElementById('log-rows');
      if (!logs.length) {
        tbody.innerHTML = '<tr><td colspan="7" class="muted">No data</td></tr>';
        return;
      }
      tbody.innerHTML = '';
      logs.slice().reverse().forEach(entry => {
        const tr = document.createElement('tr');
        const ts = new Date(entry.ts || Date.now()).toLocaleString();
        const meta = entry.meta || {};
        tr.innerHTML = `
          <td>${ts}</td>
          <td><span class="badge ${entry.type}">${entry.type}</span></td>
          <td>${formatBytes(entry.bytes)}</td>
          <td>${meta.transport || meta.profile || '—'}</td>
          <td>${meta.chunkSize ? formatBytes(meta.chunkSize) : '—'}</td>
          <td>${meta.handshakeMs ? meta.handshakeMs + ' ms' : '—'}</td>
          <td>${meta.transferMs ? meta.transferMs + ' ms' : '—'}</td>`;
        tbody.appendChild(tr);
      });
    }

    function formatBytes(num) {
      if (!num) return '0 B';
      const units = ['B','KB','MB','GB'];
      let i = 0;
      let value = Number(num);
      while (value >= 1024 && i < units.length - 1) {
        value /= 1024;
        i += 1;
      }
      return `${value.toFixed(value >= 10 || i === 0 ? 0 : 1)} ${units[i]}`;
    }

    document.getElementById('refresh').addEventListener('click', loadStats);
    document.getElementById('type-filter').addEventListener('change', loadStats);
    document.getElementById('limit').addEventListener('change', loadStats);
    document.getElementById('download').addEventListener('click', () => {
      window.open(csvUrl(), '_blank');
    });

    loadStats();
  </script>
</body>
</html>
