<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scene Sync — afjk.jp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #222; }
    canvas { display: block; }
    #status {
      position: fixed;
      top: 12px;
      right: 12px;
      padding: 6px 14px;
      border-radius: 6px;
      font: 13px/1.4 monospace;
      color: #fff;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(6px);
      z-index: 10;
      user-select: none;
    }
    #status .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
    }
    #status .dot.on  { background: #4f4; }
    #status .dot.off { background: #f44; }
    #mode {
      position: fixed;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      padding: 6px 14px;
      border-radius: 6px;
      font: 13px/1.4 monospace;
      color: #aaa;
      background: rgba(0,0,0,0.45);
      z-index: 10;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="status"><span class="dot off"></span>接続中…</div>
  <div id="mode">W: 移動 &nbsp; E: 回転 &nbsp; R: スケール</div>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="/assets/js/pipe/scene.js"></script>
</body>
</html>
